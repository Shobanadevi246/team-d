# Application
spring.application.name=Smart Hospital Pharmacy System
server.port=${SERVER_PORT:8080}

# Database
# Default to the bundled H2 database so the app starts without any external setup.
# Override these env vars when you want to use MySQL instead.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/smart_pharmacy_portal;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail Configuration (Gmail SMTP)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:shobanadevia246@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:teli nwjh hxhc ptrm}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT
jwt.secret=SmartHospitalPharmacySystemSecretKey2024!@#$%^&*()
jwt.expiration=86400000

# Admin Credentials (hardcoded)
admin.username=admin
admin.password=Admin@123
admin.email=admin@smarthospital.com

# File Storage
file.upload-dir=./uploads/medicines

# Logging
logging.level.com.pharmacy=INFO
logging.level.org.springframework.security=WARN

# Anthropic API (for AI features - drug interaction checker and AI shift summaries)
# Get key from: https://console.anthropic.com
anthropic.api.key=${ANTHROPIC_API_KEY:}
