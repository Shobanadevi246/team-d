<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Prescriptions - Smart Hospital Pharmacy</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <th:block th:replace="~{fragments/layout :: layout-styles}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/layout :: admin-sidebar}"></th:block>
<th:block th:replace="~{fragments/layout :: admin-header('Prescriptions')}"></th:block>
<main class="main-content"><div class="content-area">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="fa fa-check-circle me-2"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><i class="fa fa-exclamation-circle me-2"></i><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

    <div class="page-header d-flex align-items-center justify-content-between">
        <div>
            <h2><i class="fa fa-file-prescription me-2" style="color:var(--secondary);"></i>Prescription History</h2>
            <p>Dispense medicines and track patient prescription records</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newRxModal">
            <i class="fa fa-plus me-2"></i>Dispense Medicine
        </button>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="stat-card text-center">
                <div class="stat-icon mx-auto mb-2" style="background:rgba(26,58,92,0.1);color:var(--primary);"><i class="fa fa-file-prescription"></i></div>
                <div class="stat-num" th:text="${totalPrescriptions}">0</div>
                <div class="stat-label">Total Prescriptions</div>
            </div>
        </div>
        <div th:each="mp, i : ${mostPrescribed}" th:if="${i.index < 1}" class="col-6 col-md-3">
            <div class="stat-card text-center">
                <div class="stat-icon mx-auto mb-2" style="background:rgba(13,124,102,0.1);color:var(--secondary);"><i class="fa fa-fire"></i></div>
                <div class="stat-num" th:text="${mp[1]}">0</div>
                <div class="stat-label" th:text="'Top: ' + ${mp[0]}"></div>
            </div>
        </div>
    </div>

    <!-- Most Prescribed -->
    <div th:if="${mostPrescribed != null and !mostPrescribed.isEmpty()}" class="table-card mb-4">
        <div class="table-header"><div class="table-title"><i class="fa fa-fire me-2" style="color:#e74c3c;"></i>Most Prescribed Medicines</div></div>
        <div class="p-4 d-flex flex-wrap gap-3">
            <div th:each="mp, i : ${mostPrescribed}" th:if="${i.index < 6}"
                 class="d-flex align-items-center gap-2 px-3 py-2"
                 style="background:var(--light);border-radius:10px;">
                <span style="font-weight:800;color:var(--primary);" th:text="'#' + ${i.count}"></span>
                <span style="font-size:13px;font-weight:600;" th:text="${mp[0]}"></span>
                <span class="badge-success" th:text="${mp[1]} + ' times'"></span>
            </div>
        </div>
    </div>

    <!-- Prescriptions Table -->
    <div class="table-card">
        <div class="table-header">
            <div class="table-title"><i class="fa fa-list me-2"></i>All Prescriptions</div>
            <input type="text" class="form-control" id="rxSearch" style="width:200px;font-size:13px;" placeholder="Search patient..." onkeyup="filterRx()"/>
        </div>
        <div class="table-responsive">
            <table class="table" id="rxTable">
                <thead><tr><th>#</th><th>Rx No.</th><th>Patient</th><th>Doctor</th><th>Medicine</th><th>Qty</th><th>Dosage</th><th>Duration</th><th>Dispensed By</th><th>Date</th></tr></thead>
                <tbody>
                <tr th:if="${prescriptions == null or prescriptions.isEmpty()}">
                    <td colspan="10" class="text-center py-5 text-muted"><i class="fa fa-file-prescription fa-2x mb-2 d-block"></i>No prescriptions yet.</td>
                </tr>
                <tr th:each="rx, i : ${prescriptions}">
                    <td th:text="${i.count}"></td>
                    <td><code th:text="${rx.prescriptionNumber}"></code></td>
                    <td>
                        <div class="fw-600" th:text="${rx.patientName}"></div>
                        <div class="text-muted" style="font-size:11px;" th:text="${rx.patientAge != null ? rx.patientAge + ' yrs' : ''} + ${rx.patientGender != null ? ' • ' + rx.patientGender : ''}"></div>
                    </td>
                    <td th:text="${rx.doctorName ?: '-'}"></td>
                    <td class="fw-600" th:text="${rx.medicineName}"></td>
                    <td th:text="${rx.quantityDispensed} + ' units'"></td>
                    <td th:text="${rx.dosage ?: '-'}"></td>
                    <td th:text="${rx.durationDays != null ? rx.durationDays + ' days' : '-'}"></td>
                    <td>
                        <span th:if="${rx.dispensedByAdmin}" class="badge-info">Admin</span>
                        <span th:if="${!rx.dispensedByAdmin}" class="badge-success" th:text="${rx.dispensedByStaff?.staffName ?: 'Staff'}"></span>
                    </td>
                    <td th:text="${rx.prescriptionDate != null ? #temporals.format(rx.prescriptionDate, 'dd MMM yyyy') : 'N/A'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div></main>

<!-- Dispense Modal -->
<div class="modal fade" id="newRxModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border:none;border-radius:16px;">
            <div class="modal-header" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border-radius:16px 16px 0 0;">
                <h5 class="modal-title"><i class="fa fa-file-prescription me-2"></i>Dispense Medicine</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" style="background:var(--card-bg);">
                <form th:action="@{/admin/prescriptions/create}" method="post">
                    <h6 style="color:var(--secondary);font-weight:700;margin-bottom:12px;">Patient Information</h6>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6"><label class="form-label">Patient Name *</label><input type="text" class="form-control" name="patientName" required placeholder="Full name"/></div>
                        <div class="col-md-3"><label class="form-label">Age</label><input type="text" class="form-control" name="patientAge" placeholder="e.g. 35"/></div>
                        <div class="col-md-3"><label class="form-label">Gender</label>
                            <select class="form-select" name="patientGender"><option value="">-</option><option>Male</option><option>Female</option><option>Other</option></select></div>
                        <div class="col-md-6"><label class="form-label">Doctor Name</label><input type="text" class="form-control" name="doctorName" placeholder="Dr. Name"/></div>
                        <div class="col-md-6"><label class="form-label">Ward / Room No.</label><input type="text" class="form-control" name="wardNumber" placeholder="Ward 3B"/></div>
                    </div>
                    <h6 style="color:var(--secondary);font-weight:700;margin-bottom:12px;">Medicine Details</h6>
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Medicine *</label>
                            <select class="form-select" name="medicineId" required>
                                <option value="">-- Select --</option>
                                <option th:each="med : ${medicines}" th:value="${med.id}" th:text="${med.productName + ' (Stock: ' + med.stockQuantity + ')'}"></option>
                            </select></div>
                        <div class="col-md-3"><label class="form-label">Quantity *</label><input type="number" class="form-control" name="quantityDispensed" min="1" required/></div>
                        <div class="col-md-3"><label class="form-label">Duration (Days)</label><input type="number" class="form-control" name="durationDays" min="1" placeholder="7"/></div>
                        <div class="col-md-4"><label class="form-label">Dosage</label><input type="text" class="form-control" name="dosage" placeholder="500mg"/></div>
                        <div class="col-md-4"><label class="form-label">Frequency</label><input type="text" class="form-control" name="frequency" placeholder="Twice daily"/></div>
                        <div class="col-md-4"><label class="form-label">Instructions</label><input type="text" class="form-control" name="instructions" placeholder="After meals"/></div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4"><i class="fa fa-check me-2"></i>Dispense</button>
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: layout-scripts}"></th:block>
<script>
function filterRx(){const q=document.getElementById('rxSearch').value.toLowerCase();document.querySelectorAll('#rxTable tbody tr').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q)?'':'none';});}
initSearch('/admin/search');
</script>
</body>
</html>
