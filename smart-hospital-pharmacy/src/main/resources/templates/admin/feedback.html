<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Customer Feedback - Smart Hospital Pharmacy</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <th:block th:replace="~{fragments/layout :: layout-styles}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/layout :: admin-sidebar}"></th:block>
<th:block th:replace="~{fragments/layout :: admin-header('Customer Feedback')}"></th:block>
<main class="main-content"><div class="content-area">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="fa fa-check-circle me-2"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><i class="fa fa-exclamation-circle me-2"></i><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

    <div class="page-header">
        <h2><i class="fa fa-comments me-2" style="color:var(--secondary);"></i>Customer Feedback</h2>
        <p>Collect and manage feedback from patients, doctors, customers and nurses</p>
    </div>

    <div class="row g-4">
        <!-- Add Feedback Form -->
        <div class="col-lg-4">
            <div class="table-card p-4">
                <h6 style="font-weight:700;color:var(--primary);margin-bottom:16px;"><i class="fa fa-plus-circle me-2"></i>Add Feedback</h6>
                <form th:action="@{/admin/feedback/add}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Customer Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="customerName" required placeholder="Full name"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Customer Type <span class="text-danger">*</span></label>
                        <select class="form-select" name="customerType" required>
                            <option value="">-- Select Type --</option>
                            <option value="PATIENT">Patient</option>
                            <option value="DOCTOR">Doctor</option>
                            <option value="CUSTOMER">Customer</option>
                            <option value="NURSE">Nurse</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Medicine Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="medicineName" required placeholder="e.g. Paracetamol"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Medicine Brand <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="medicineBrand" required placeholder="e.g. Crocin"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rating</label>
                        <select class="form-select" name="rating">
                            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                            <option value="4">⭐⭐⭐⭐ Good</option>
                            <option value="3">⭐⭐⭐ Average</option>
                            <option value="2">⭐⭐ Poor</option>
                            <option value="1">⭐ Very Poor</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Review <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="review" rows="3" required placeholder="Enter detailed feedback..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="fa fa-save me-2"></i>Submit Feedback</button>
                </form>
            </div>
        </div>

        <!-- Feedback List -->
        <div class="col-lg-8">
            <div class="table-card">
                <div class="table-header">
                    <div class="table-title"><i class="fa fa-list me-2"></i>All Feedback</div>
                    <span class="badge-info" th:text="${feedbacks?.size() + ' reviews'}">0</span>
                </div>
                <div th:if="${feedbacks == null or feedbacks.isEmpty()}" class="text-center py-5 text-muted">
                    <i class="fa fa-comments fa-2x mb-2 d-block"></i>No feedback yet. Add the first one!
                </div>
                <div th:each="fb : ${feedbacks}" class="p-4 border-bottom">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <span class="fw-700" style="font-size:15px;" th:text="${fb.customerName}"></span>
                            <span class="ms-2">
                                <span th:if="${fb.customerType.name() == 'PATIENT'}" class="badge-info" style="font-size:10px;">Patient</span>
                                <span th:if="${fb.customerType.name() == 'DOCTOR'}" class="badge-success" style="font-size:10px;">Doctor</span>
                                <span th:if="${fb.customerType.name() == 'CUSTOMER'}" class="badge-warning" style="font-size:10px;">Customer</span>
                                <span th:if="${fb.customerType.name() == 'NURSE'}" class="badge-danger" style="font-size:10px;">Nurse</span>
                            </span>
                        </div>
                        <div class="text-warning">
                            <span th:each="star : ${#numbers.sequence(1, fb.rating)}">⭐</span>
                        </div>
                    </div>
                    <div class="text-muted mb-1" style="font-size:13px;">
                        <i class="fa fa-pills me-1"></i>
                        <strong th:text="${fb.medicineName}"></strong> by <em th:text="${fb.medicineBrand}"></em>
                    </div>
                    <p style="font-size:13px;color:#555;margin-bottom:6px;" th:text="${fb.review}"></p>
                    <div class="text-muted" style="font-size:11px;">
                        <i class="fa fa-clock me-1"></i>
                        <span th:text="${fb.createdAt != null ? #temporals.format(fb.createdAt, 'dd MMM yyyy HH:mm') : ''}"></span>
                        &nbsp;|&nbsp;
                        <span th:if="${fb.submittedByAdmin}" class="badge-info" style="font-size:10px;">By Admin</span>
                        <span th:if="${!fb.submittedByAdmin}" class="badge-success" style="font-size:10px;" th:text="'By ' + ${fb.submittedByStaff?.staffName ?: 'Staff'}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div></main>
<th:block th:replace="~{fragments/layout :: layout-scripts}"></th:block>
</body>
</html>
