<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Reports - Staff Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <th:block th:replace="~{fragments/layout :: layout-styles}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/layout :: staff-sidebar}"></th:block>
<th:block th:replace="~{fragments/layout :: staff-header('Reports & Analysis')}"></th:block>
<main class="main-content"><div class="content-area">
    <div class="page-header"><h2><i class="fa fa-chart-bar me-2" style="color:var(--secondary);"></i>Reports &amp; Analysis</h2><p>Download pharmacy reports and view sales analysis</p></div>

    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3"><div class="stat-card text-center"><div class="stat-icon mx-auto mb-2" style="background:rgba(26,58,92,0.1);color:var(--primary);"><i class="fa fa-pills"></i></div><div class="stat-num" th:text="${totalMedicines}">0</div><div class="stat-label">Medicines</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card text-center"><div class="stat-icon mx-auto mb-2" style="background:rgba(243,156,18,0.1);color:#f39c12;"><i class="fa fa-comments"></i></div><div class="stat-num" th:text="${totalFeedback}">0</div><div class="stat-label">Feedback</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card text-center"><div class="stat-icon mx-auto mb-2" style="background:rgba(231,76,60,0.1);color:#e74c3c;"><i class="fa fa-exclamation-triangle"></i></div><div class="stat-num" th:text="${lowStockCount}">0</div><div class="stat-label">Low Stock</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card text-center"><div class="stat-icon mx-auto mb-2" style="background:rgba(13,124,102,0.1);color:var(--secondary);"><i class="fa fa-calendar-times"></i></div><div class="stat-num" th:text="${expiringCount}">0</div><div class="stat-label">Expiring</div></div></div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="table-card p-4">
                <h6 style="font-weight:700;color:var(--primary);margin-bottom:16px;"><i class="fa fa-pills me-2"></i>Medicine Report</h6>
                <div class="table-responsive mb-3" style="max-height:200px;overflow-y:auto;">
                    <table class="table table-sm"><thead><tr><th>Name</th><th>SKU</th><th>Stock</th></tr></thead><tbody>
                    <tr th:each="m : ${medicines}"><td th:text="${m.productName}"></td><td><code th:text="${m.skuId}"></code></td>
                    <td><span th:if="${m.stockQuantity < 10}" class="badge-danger" th:text="${m.stockQuantity}"></span><span th:if="${m.stockQuantity >= 10}" class="badge-success" th:text="${m.stockQuantity}"></span></td></tr>
                    </tbody></table>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/staff/reports/download/medicine/pdf}" class="btn btn-outline-primary btn-sm flex-fill"><i class="fa fa-file-pdf me-1"></i>PDF</a>
                    <a th:href="@{/staff/reports/download/medicine/excel}" class="btn btn-outline-primary btn-sm flex-fill"><i class="fa fa-file-excel me-1"></i>Excel</a>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="table-card p-4">
                <h6 style="font-weight:700;color:var(--primary);margin-bottom:16px;"><i class="fa fa-comments me-2"></i>Feedback Report</h6>
                <div class="table-responsive mb-3" style="max-height:200px;overflow-y:auto;">
                    <table class="table table-sm"><thead><tr><th>Customer</th><th>Medicine</th><th>Rating</th></tr></thead><tbody>
                    <tr th:each="fb : ${feedbacks}"><td th:text="${fb.customerName}"></td><td th:text="${fb.medicineName}"></td><td th:text="${fb.rating} + '/5'"></td></tr>
                    </tbody></table>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/staff/reports/download/feedback/pdf}" class="btn btn-outline-primary btn-sm flex-fill"><i class="fa fa-file-pdf me-1"></i>PDF</a>
                    <a th:href="@{/staff/reports/download/feedback/excel}" class="btn btn-outline-primary btn-sm flex-fill"><i class="fa fa-file-excel me-1"></i>Excel</a>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="table-card p-4">
                <h6 style="font-weight:700;color:var(--primary);margin-bottom:16px;"><i class="fa fa-fire me-2" style="color:#e74c3c;"></i>Fast Selling Medicines</h6>
                <canvas id="fastChart" height="200"></canvas>
                <div class="mt-3">
                    <div th:each="item, i : ${fastSelling}" class="d-flex justify-content-between mb-2" th:if="${i.index < 5}">
                        <span style="font-size:13px;" th:text="${item[1]}"></span>
                        <span class="badge-success" th:text="${item[2]} + ' sold'"></span>
                    </div>
                    <div th:if="${fastSelling == null or fastSelling.isEmpty()}" class="text-center text-muted py-3">No sales data yet.</div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="table-card p-4">
                <h6 style="font-weight:700;color:var(--primary);margin-bottom:16px;"><i class="fa fa-ban me-2" style="color:#888;"></i>Slow Selling Medicines</h6>
                <canvas id="slowChart" height="200"></canvas>
                <div class="mt-3">
                    <div th:each="item, i : ${slowSelling}" class="d-flex justify-content-between mb-2" th:if="${i.index < 5}">
                        <span style="font-size:13px;" th:text="${item[1]}"></span>
                        <span class="badge-warning" th:text="${item[2]} + ' sold'"></span>
                    </div>
                    <div th:if="${slowSelling == null or slowSelling.isEmpty()}" class="text-center text-muted py-3">No sales data yet.</div>
                </div>
            </div>
        </div>
    </div>
</div></main>
<th:block th:replace="~{fragments/layout :: layout-scripts}"></th:block>
<script>
const fl=/*[[${fastSelling != null ? fastSelling.![#this[1]] : {}}]]*/ [];
const fv=/*[[${fastSelling != null ? fastSelling.![#this[2]] : {}}]]*/ [];
if(fl.length>0){new Chart(document.getElementById('fastChart'),{type:'bar',data:{labels:fl.slice(0,5),datasets:[{label:'Units Sold',data:fv.slice(0,5),backgroundColor:'rgba(13,124,102,0.7)',borderRadius:8}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});}
const sl=/*[[${slowSelling != null ? slowSelling.![#this[1]] : {}}]]*/ [];
const sv=/*[[${slowSelling != null ? slowSelling.![#this[2]] : {}}]]*/ [];
if(sl.length>0){new Chart(document.getElementById('slowChart'),{type:'bar',data:{labels:sl.slice(0,5),datasets:[{label:'Units Sold',data:sv.slice(0,5),backgroundColor:'rgba(243,156,18,0.7)',borderRadius:8}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});}
</script>
</body>
</html>
