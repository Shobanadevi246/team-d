<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Medicine Details - Staff Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <th:block th:replace="~{fragments/layout :: layout-styles}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/layout :: staff-sidebar}"></th:block>
<th:block th:replace="~{fragments/layout :: staff-header('Medicine Details')}"></th:block>
<main class="main-content"><div class="content-area">
    <div class="page-header d-flex align-items-center justify-content-between">
        <div><h2><i class="fa fa-pills me-2" style="color:var(--secondary);"></i>Medicine Details</h2><p>All medicines in the system</p></div>
        <a th:href="@{/staff/medicines/add}" class="btn btn-primary"><i class="fa fa-plus me-2"></i>Add Medicine</a>
    </div>
    <div class="table-card mb-3 p-3"><input type="text" class="form-control" id="searchInput" placeholder="🔍 Search by name or SKU..." onkeyup="filterTable()"/></div>
    <div class="table-card">
        <div class="table-header"><div class="table-title"><i class="fa fa-list me-2"></i>All Medicines</div><span class="badge-info" th:text="${medicines?.size() + ' medicines'}">0</span></div>
        <div class="table-responsive">
            <table class="table" id="medicinesTable">
                <thead><tr><th>#</th><th>Image</th><th>Product Name</th><th>SKU ID</th><th>Stock</th><th>Expiry</th><th>Added By</th><th>Action</th></tr></thead>
                <tbody>
                <tr th:if="${medicines == null or medicines.isEmpty()}"><td colspan="8" class="text-center py-5 text-muted"><i class="fa fa-pills fa-2x mb-2 d-block"></i>No medicines found. <a th:href="@{/staff/medicines/add}">Add one now.</a></td></tr>
                <tr th:each="med, i : ${medicines}">
                    <td th:text="${i.count}"></td>
                    <td>
                        <img th:if="${med.imagePath != null}" th:src="@{'/uploads/medicines/' + ${med.imagePath}}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;" onerror="this.style.display='none'"/>
                        <div th:if="${med.imagePath == null}" class="stat-icon" style="width:40px;height:40px;background:rgba(26,58,92,0.08);color:var(--primary);font-size:14px;border-radius:8px;"><i class="fa fa-pills"></i></div>
                    </td>
                    <td class="fw-600" th:text="${med.productName}"></td>
                    <td><code th:text="${med.skuId}"></code></td>
                    <td>
                        <span th:if="${med.stockQuantity < 10}" class="badge-danger" th:text="${med.stockQuantity} + ' units'"></span>
                        <span th:if="${med.stockQuantity >= 10 and med.stockQuantity < 50}" class="badge-warning" th:text="${med.stockQuantity} + ' units'"></span>
                        <span th:if="${med.stockQuantity >= 50}" class="badge-success" th:text="${med.stockQuantity} + ' units'"></span>
                    </td>
                    <td th:text="${med.expiryDate != null ? #temporals.format(med.expiryDate, 'dd MMM yyyy') : 'N/A'}"></td>
                    <td>
                        <span th:if="${med.adminAdded}" class="badge-info">Admin</span>
                        <span th:if="${!med.adminAdded}" class="badge-success" th:text="${med.addedByStaff?.staffName ?: 'Staff'}"></span>
                    </td>
                    <td><a th:href="@{'/staff/medicines/' + ${med.id}}" class="btn btn-outline-primary btn-sm"><i class="fa fa-eye me-1"></i>View</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div></main>
<th:block th:replace="~{fragments/layout :: layout-scripts}"></th:block>
<script>function filterTable(){const q=document.getElementById('searchInput').value.toLowerCase();document.querySelectorAll('#medicinesTable tbody tr').forEach(row=>{row.style.display=row.textContent.toLowerCase().includes(q)?'':'none';});}</script>
</body>
</html>
