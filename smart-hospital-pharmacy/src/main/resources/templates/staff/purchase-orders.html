<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Purchase Orders - Staff Panel</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<th:block th:replace="~{fragments/layout :: layout-styles}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/layout :: staff-sidebar}"></th:block>
<th:block th:replace="~{fragments/layout :: staff-header('Purchase Orders')}"></th:block>
<main class="main-content"><div class="content-area">
<div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="fa fa-check-circle me-2"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><i class="fa fa-exclamation-circle me-2"></i><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="page-header d-flex align-items-center justify-content-between">
    <div><h2><i class="fa fa-shopping-cart me-2" style="color:var(--secondary);"></i>Purchase Orders</h2><p>Raise purchase requests for medicine restocking</p></div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#poModal"><i class="fa fa-plus me-2"></i>Raise Order</button>
</div>
<div class="alert alert-info mb-4"><i class="fa fa-info-circle me-2"></i>Purchase orders raised by staff are sent to admin for approval.</div>
<div class="table-card">
    <div class="table-header"><div class="table-title"><i class="fa fa-list me-2"></i>My Purchase Orders</div></div>
    <div class="table-responsive">
        <table class="table">
            <thead><tr><th>#</th><th>Order No.</th><th>Medicine</th><th>Qty</th><th>Supplier</th><th>Status</th><th>Raised On</th></tr></thead>
            <tbody>
            <tr th:if="${orders == null or orders.isEmpty()}"><td colspan="7" class="text-center py-5 text-muted"><i class="fa fa-shopping-cart fa-2x mb-2 d-block"></i>No purchase orders yet.</td></tr>
            <tr th:each="order, i : ${orders}">
                <td th:text="${i.count}"></td>
                <td><code th:text="${order.orderNumber}"></code></td>
                <td class="fw-600" th:text="${order.medicine?.productName}"></td>
                <td th:text="${order.quantityOrdered} + ' units'"></td>
                <td th:text="${order.supplierName ?: '-'}"></td>
                <td>
                    <span th:if="${order.status.name() == 'PENDING'}" class="badge-warning">Pending</span>
                    <span th:if="${order.status.name() == 'APPROVED'}" class="badge-info">Approved</span>
                    <span th:if="${order.status.name() == 'ORDERED'}" class="badge-purple">Ordered</span>
                    <span th:if="${order.status.name() == 'DELIVERED'}" class="badge-success">Delivered</span>
                    <span th:if="${order.status.name() == 'CANCELLED'}" class="badge-danger">Cancelled</span>
                </td>
                <td th:text="${order.createdAt != null ? #temporals.format(order.createdAt,'dd MMM yyyy') : 'N/A'}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</div></main>
<div class="modal fade" id="poModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="border:none;border-radius:16px;">
            <div class="modal-header" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border-radius:16px 16px 0 0;">
                <h5 class="modal-title"><i class="fa fa-shopping-cart me-2"></i>Raise Purchase Order</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" style="background:var(--card-bg);">
                <form th:action="@{/staff/purchase-orders/create}" method="post">
                    <div class="mb-3"><label class="form-label">Medicine *</label>
                        <select class="form-select" name="medicineId" required><option value="">-- Select --</option>
                        <option th:each="med : ${medicines}" th:value="${med.id}" th:text="${med.productName + ' (Stock: ' + med.stockQuantity + ')'}"></option></select></div>
                    <div class="mb-3"><label class="form-label">Quantity *</label><input type="number" class="form-control" name="quantityOrdered" min="1" required placeholder="e.g. 50"/></div>
                    <div class="mb-3"><label class="form-label">Supplier Name</label><input type="text" class="form-control" name="supplierName" placeholder="Optional"/></div>
                    <div class="mb-3"><label class="form-label">Notes</label><textarea class="form-control" name="notes" rows="2" placeholder="Reason for order..."></textarea></div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4"><i class="fa fa-paper-plane me-2"></i>Raise Order</button>
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: layout-scripts}"></th:block>
</body>
</html>
