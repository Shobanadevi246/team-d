<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Prescriptions - Staff Panel</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<th:block th:replace="~{fragments/layout :: layout-styles}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/layout :: staff-sidebar}"></th:block>
<th:block th:replace="~{fragments/layout :: staff-header('Prescriptions')}"></th:block>
<main class="main-content"><div class="content-area">
<div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="fa fa-check-circle me-2"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><i class="fa fa-exclamation-circle me-2"></i><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
<div class="page-header d-flex align-items-center justify-content-between">
    <div><h2><i class="fa fa-file-prescription me-2" style="color:var(--secondary);"></i>My Prescriptions</h2><p>Dispense medicines and maintain prescription records</p></div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#rxModal"><i class="fa fa-plus me-2"></i>Dispense Medicine</button>
</div>
<div class="table-card">
    <div class="table-header"><div class="table-title"><i class="fa fa-list me-2"></i>Prescriptions Dispensed by Me</div></div>
    <div class="table-responsive">
        <table class="table">
            <thead><tr><th>#</th><th>Rx No.</th><th>Patient</th><th>Doctor</th><th>Medicine</th><th>Qty</th><th>Dosage</th><th>Date</th></tr></thead>
            <tbody>
            <tr th:if="${prescriptions == null or prescriptions.isEmpty()}"><td colspan="8" class="text-center py-5 text-muted"><i class="fa fa-file-prescription fa-2x mb-2 d-block"></i>No prescriptions dispensed yet.</td></tr>
            <tr th:each="rx, i : ${prescriptions}">
                <td th:text="${i.count}"></td>
                <td><code th:text="${rx.prescriptionNumber}"></code></td>
                <td><div class="fw-600" th:text="${rx.patientName}"></div><div style="font-size:11px;color:var(--text-muted);" th:text="${rx.patientAge != null ? rx.patientAge + ' yrs' : ''}"></div></td>
                <td th:text="${rx.doctorName ?: '-'}"></td>
                <td class="fw-600" th:text="${rx.medicineName}"></td>
                <td th:text="${rx.quantityDispensed} + ' units'"></td>
                <td th:text="${rx.dosage ?: '-'}"></td>
                <td th:text="${rx.prescriptionDate != null ? #temporals.format(rx.prescriptionDate,'dd MMM yyyy') : 'N/A'}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</div></main>
<div class="modal fade" id="rxModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border:none;border-radius:16px;">
            <div class="modal-header" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border-radius:16px 16px 0 0;">
                <h5 class="modal-title"><i class="fa fa-file-prescription me-2"></i>Dispense Medicine</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" style="background:var(--card-bg);">
                <form th:action="@{/staff/prescriptions/create}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Patient Name *</label><input type="text" class="form-control" name="patientName" required placeholder="Full name"/></div>
                        <div class="col-md-3"><label class="form-label">Age</label><input type="text" class="form-control" name="patientAge" placeholder="35"/></div>
                        <div class="col-md-3"><label class="form-label">Gender</label><select class="form-select" name="patientGender"><option>-</option><option>Male</option><option>Female</option><option>Other</option></select></div>
                        <div class="col-md-6"><label class="form-label">Doctor Name</label><input type="text" class="form-control" name="doctorName" placeholder="Dr. Name"/></div>
                        <div class="col-md-6"><label class="form-label">Ward / Room</label><input type="text" class="form-control" name="wardNumber" placeholder="Ward 3B"/></div>
                        <div class="col-md-6"><label class="form-label">Medicine *</label>
                            <select class="form-select" name="medicineId" required><option value="">-- Select --</option>
                            <option th:each="med : ${medicines}" th:value="${med.id}" th:text="${med.productName + ' (Stock: ' + med.stockQuantity + ')'}"></option></select></div>
                        <div class="col-md-3"><label class="form-label">Quantity *</label><input type="number" class="form-control" name="quantityDispensed" min="1" required/></div>
                        <div class="col-md-3"><label class="form-label">Duration (days)</label><input type="number" class="form-control" name="durationDays" min="1"/></div>
                        <div class="col-md-4"><label class="form-label">Dosage</label><input type="text" class="form-control" name="dosage" placeholder="500mg"/></div>
                        <div class="col-md-4"><label class="form-label">Frequency</label><input type="text" class="form-control" name="frequency" placeholder="Twice daily"/></div>
                        <div class="col-md-4"><label class="form-label">Instructions</label><input type="text" class="form-control" name="instructions" placeholder="After meals"/></div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4"><i class="fa fa-check me-2"></i>Dispense</button>
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: layout-scripts}"></th:block>
</body>
</html>
