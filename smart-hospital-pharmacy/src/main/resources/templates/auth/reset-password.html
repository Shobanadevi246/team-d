<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password - Smart Hospital Pharmacy</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1a3a5c,#0d7c66);min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .card{border:none;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-width:440px;width:100%;padding:40px;}
        .form-control{border:2px solid #e8ecf0;border-radius:10px;padding:12px 16px;font-size:14px;}
        .form-control:focus{border-color:#0d7c66;box-shadow:0 0 0 4px rgba(13,124,102,0.1);outline:none;}
        .btn-primary-custom{background:linear-gradient(135deg,#1a3a5c,#0d7c66);border:none;width:100%;padding:12px;border-radius:10px;color:white;font-weight:600;font-size:15px;cursor:pointer;transition:all 0.3s;}
        .btn-primary-custom:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.2);}
        .pw-rule{font-size:12px;padding:3px 0;} .pw-rule.ok{color:#0d7c66;} .pw-rule.fail{color:#e74c3c;}
        .strength-bar{height:4px;border-radius:2px;background:#eee;margin-top:6px;}
        .strength-fill{height:100%;border-radius:2px;transition:all 0.3s;}
        .input-wrap{position:relative;}
        .input-wrap .fa-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;}
    </style>
</head>
<body>
<div class="card">
    <div style="text-align:center;margin-bottom:24px;">
        <div style="width:70px;height:70px;background:linear-gradient(135deg,#1a3a5c,#0d7c66);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:auto;">
            <i class="fa fa-lock fa-2x" style="color:white;"></i>
        </div>
    </div>
    <h4 class="text-center mb-1" style="color:#1a3a5c;font-weight:800;">Reset Password</h4>
    <p class="text-center text-muted mb-4" style="font-size:14px;">Create a new strong password</p>

    <div th:if="${error}" class="alert alert-danger rounded-3 py-2 mb-3" style="font-size:13px;">
        <i class="fa fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    </div>

    <form th:action="@{/auth/reset-password}" method="post" onsubmit="return validate()">
        <input type="hidden" name="email" th:value="${email}"/>
        <div class="mb-3">
            <label class="form-label" style="font-size:13px;font-weight:600;color:#1a3a5c;">New Password</label>
            <div class="input-wrap">
                <input type="password" name="newPassword" id="newPw" class="form-control" placeholder="New password" required oninput="checkStrength(this.value)"/>
                <i class="fa fa-eye" onclick="togglePw('newPw',this)"></i>
            </div>
            <div class="strength-bar mt-2"><div class="strength-fill" id="strengthFill" style="width:0%;background:#e74c3c;"></div></div>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-size:13px;font-weight:600;color:#1a3a5c;">Confirm Password</label>
            <div class="input-wrap">
                <input type="password" name="confirmPassword" id="confPw" class="form-control" placeholder="Confirm password" required/>
                <i class="fa fa-eye" onclick="togglePw('confPw',this)"></i>
            </div>
        </div>
        <div class="mb-3 p-3" style="background:#f8f9fa;border-radius:10px;">
            <div class="pw-rule fail" id="r1"><i class="fa fa-times me-1"></i>At least 8 characters</div>
            <div class="pw-rule fail" id="r2"><i class="fa fa-times me-1"></i>At least 1 uppercase letter</div>
            <div class="pw-rule fail" id="r3"><i class="fa fa-times me-1"></i>At least 1 number</div>
            <div class="pw-rule fail" id="r4"><i class="fa fa-times me-1"></i>At least 1 special character (!@#$...)</div>
        </div>
        <button type="submit" class="btn-primary-custom"><i class="fa fa-save me-2"></i>Reset Password</button>
    </form>
</div>
<script>
    function togglePw(id, icon) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
    }
    function checkStrength(pw) {
        const rules = [pw.length >= 8, /[A-Z]/.test(pw), /[0-9]/.test(pw), /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)];
        ['r1','r2','r3','r4'].forEach((id, i) => {
            const el = document.getElementById(id);
            el.className = 'pw-rule ' + (rules[i] ? 'ok' : 'fail');
            el.querySelector('i').className = 'fa me-1 ' + (rules[i] ? 'fa-check' : 'fa-times');
        });
        const score = rules.filter(Boolean).length;
        const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71'];
        const fill = document.getElementById('strengthFill');
        fill.style.width = (score * 25) + '%';
        fill.style.background = colors[score - 1] || '#e74c3c';
    }
    function validate() {
        const pw = document.getElementById('newPw').value;
        const conf = document.getElementById('confPw').value;
        if (pw !== conf) { alert('Passwords do not match!'); return false; }
        if (!/^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}$/.test(pw)) {
            alert('Password does not meet requirements!'); return false;
        }
        return true;
    }
</script>
</body>
</html>
