<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password - Smart Hospital Pharmacy</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#1a3a5c,#0d7c66); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { border:none; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.2); max-width:420px; width:100%; padding:40px; }
        .icon-wrap { width:80px; height:80px; background:linear-gradient(135deg,#1a3a5c,#0d7c66); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
        .icon-wrap i { font-size:32px; color:white; }
        .btn-primary-custom { background:linear-gradient(135deg,#1a3a5c,#0d7c66); border:none; width:100%; padding:12px; border-radius:10px; color:white; font-weight:600; font-size:15px; cursor:pointer; transition:all 0.3s; }
        .btn-primary-custom:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.2); }
        .form-control { border:2px solid #e8ecf0; border-radius:10px; padding:12px 16px; font-size:14px; }
        .form-control:focus { border-color:#0d7c66; box-shadow:0 0 0 4px rgba(13,124,102,0.1); }
        .back-link { text-align:center; margin-top:16px; font-size:14px; }
        .back-link a { color:#0d7c66; text-decoration:none; font-weight:500; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-wrap"><i class="fa fa-key"></i></div>
    <h4 class="text-center fw-800 mb-1" style="color:#1a3a5c;font-weight:800;">Forgot Password?</h4>
    <p class="text-center text-muted mb-4" style="font-size:14px;">Enter your email to receive a reset OTP</p>

    <div th:if="${error}" class="alert alert-danger rounded-3 py-2 mb-3" style="font-size:13px;">
        <i class="fa fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    </div>

    <form th:action="@{/auth/forgot-password}" method="post">
        <div class="mb-4">
            <label class="form-label fw-600" style="font-size:13px;color:#1a3a5c;">Email Address</label>
            <div class="input-group">
                <span class="input-group-text" style="border:2px solid #e8ecf0;border-right:none;background:#f8f9fa;"><i class="fa fa-envelope text-muted"></i></span>
                <input type="email" name="email" class="form-control" style="border-left:none;" placeholder="staff@hospital.com" required/>
            </div>
        </div>
        <button type="submit" class="btn-primary-custom"><i class="fa fa-paper-plane me-2"></i>Send OTP</button>
    </form>
    <div class="back-link"><a th:href="@{/login}"><i class="fa fa-arrow-left me-1"></i>Back to Login</a></div>
</div>
</body>
</html>
