<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Smart Hospital Pharmacy - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary: #1a3a5c;
            --secondary: #0d7c66;
            --accent: #00c896;
            --danger: #e74c3c;
            --light-bg: #f0f4f8;
            --card-shadow: 0 20px 60px rgba(26,58,92,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a3a5c 0%, #0d5c48 50%, #0d7c66 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .floating-shapes span {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.05);
            animation: float 6s ease-in-out infinite;
        }
        .floating-shapes span:nth-child(1) { width: 300px; height: 300px; top: -100px; right: -100px; animation-delay: 0s; }
        .floating-shapes span:nth-child(2) { width: 200px; height: 200px; bottom: -50px; left: -50px; animation-delay: 2s; }
        .floating-shapes span:nth-child(3) { width: 150px; height: 150px; top: 50%; left: 10%; animation-delay: 4s; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }

        .login-wrapper { position: relative; z-index: 10; width: 100%; max-width: 1000px; padding: 20px; }

        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            min-height: 600px;
        }
        .login-left {
            background: linear-gradient(160deg, var(--primary) 0%, var(--secondary) 100%);
            width: 45%;
            padding: 50px 40px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; position: relative;
        }
        .login-left::after {
            content: '';
            position: absolute; right: -1px; top: 0; bottom: 0; width: 40px;
            background: white; clip-path: polygon(100% 0, 100% 100%, 0 50%);
        }
        .hospital-logo { font-size: 70px; margin-bottom: 20px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        .hospital-name {
            font-family: 'Playfair Display', serif;
            font-size: 26px; font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            line-height: 1.3; margin-bottom: 10px;
        }
        .hospital-tagline { font-size: 13px; opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; }
        .stats-row { display: flex; gap: 30px; margin-top: 40px; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 24px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }

        .login-right { flex: 1; padding: 50px 40px; display: flex; flex-direction: column; justify-content: center; }
        .login-title { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
        .login-subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }

        .login-tabs { display: flex; background: var(--light-bg); border-radius: 12px; padding: 4px; margin-bottom: 30px; }
        .login-tab {
            flex: 1; padding: 10px; border: none; background: transparent;
            border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
            color: #888; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .login-tab.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-weight: 600; }

        .form-label { font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
        .form-control {
            border: 2px solid #e8ecf0; border-radius: 10px; padding: 12px 16px;
            font-size: 14px; transition: all 0.3s;
        }
        .form-control:focus { border-color: var(--secondary); box-shadow: 0 0 0 4px rgba(13,124,102,0.1); outline: none; }
        .input-icon { position: relative; }
        .input-icon .fa { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; }
        .input-icon .form-control { padding-left: 40px; }
        .input-icon .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; }

        .btn-login {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; color: white; width: 100%; padding: 14px;
            border-radius: 12px; font-size: 15px; font-weight: 600;
            letter-spacing: 0.5px; cursor: pointer; transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,58,92,0.3); }
        .btn-login:active { transform: translateY(0); }

        .alert-custom { border-radius: 10px; border: none; font-size: 14px; padding: 12px 16px; }
        .forgot-link { text-align: right; margin-top: 6px; }
        .forgot-link a { font-size: 12px; color: var(--secondary); text-decoration: none; font-weight: 500; }
        .forgot-link a:hover { text-decoration: underline; }
        .admin-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(26,58,92,0.08); color: var(--primary);
            font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
            margin-bottom: 16px;
        }

        @media(max-width: 768px) {
            .login-left { display: none; }
            .login-card { max-width: 400px; margin: auto; }
            .login-right { padding: 30px 24px; }
        }
    </style>
</head>
<body>
<div class="floating-shapes">
    <span></span><span></span><span></span>
</div>

<div class="login-wrapper">
    <div class="login-card">
        <!-- Left Panel -->
        <div class="login-left">
            <div class="hospital-logo">🏥</div>
            <div class="hospital-name">Smart Hospital<br/>Pharmacy System</div>
            <div class="hospital-tagline">Secure · Efficient · Reliable</div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-num">24/7</div>
                    <div class="stat-label">Available</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num">100%</div>
                    <div class="stat-label">Secure</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num">Real</div>
                    <div class="stat-label">Time</div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="login-right">
            <div class="login-title">Welcome Back</div>
            <div class="login-subtitle">Sign in to your account to continue</div>

            <!-- Tabs -->
            <div class="login-tabs">
                <button class="login-tab active" id="adminTab" onclick="switchTab('admin')">
                    <i class="fa fa-user-shield"></i> Admin Login
                </button>
                <button class="login-tab" id="staffTab" onclick="switchTab('staff')">
                    <i class="fa fa-user-nurse"></i> Staff Login
                </button>
            </div>

            <!-- Alert Messages -->
            <div th:if="${error}" class="alert alert-danger alert-custom mb-3">
                <i class="fa fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
            </div>
            <div th:if="${message}" class="alert alert-success alert-custom mb-3">
                <i class="fa fa-check-circle me-2"></i>
                <span th:text="${message}"></span>
            </div>

            <!-- Admin Form -->
            <div id="adminForm">
                <div class="admin-badge"><i class="fa fa-shield-alt"></i> Administrator Access</div>
                <form th:action="@{/login}" method="post">
                    <input type="hidden" name="loginType" value="admin"/>
                    <div class="mb-3">
                        <label class="form-label">Admin Username</label>
                        <div class="input-icon">
                            <i class="fa fa-user"></i>
                            <input type="text" name="username" class="form-control" placeholder="Enter admin username" required/>
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Password</label>
                        <div class="input-icon">
                            <i class="fa fa-lock"></i>
                            <input type="password" name="password" id="adminPw" class="form-control" placeholder="Enter admin password" required/>
                            <i class="fa fa-eye toggle-pw" onclick="togglePw('adminPw', this)"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn-login">
                        <i class="fa fa-sign-in-alt me-2"></i>Login as Administrator
                    </button>
                </form>
            </div>

            <!-- Staff Form -->
            <div id="staffForm" style="display:none;">
                <form th:action="@{/login}" method="post">
                    <input type="hidden" name="loginType" value="staff"/>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <div class="input-icon">
                            <i class="fa fa-envelope"></i>
                            <input type="email" name="username" class="form-control" placeholder="Enter your email" required/>
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Password</label>
                        <div class="input-icon">
                            <i class="fa fa-lock"></i>
                            <input type="password" name="password" id="staffPw" class="form-control" placeholder="Enter your password" required/>
                            <i class="fa fa-eye toggle-pw" onclick="togglePw('staffPw', this)"></i>
                        </div>
                    </div>
                    <div class="forgot-link mb-2">
                        <a th:href="@{/auth/forgot-password}">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-login">
                        <i class="fa fa-sign-in-alt me-2"></i>Login as Staff
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
    function switchTab(type) {
        document.getElementById('adminTab').classList.toggle('active', type === 'admin');
        document.getElementById('staffTab').classList.toggle('active', type === 'staff');
        document.getElementById('adminForm').style.display = type === 'admin' ? 'block' : 'none';
        document.getElementById('staffForm').style.display = type === 'staff' ? 'block' : 'none';
    }
    function togglePw(id, icon) {
        const input = document.getElementById(id);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
</body>
</html>
